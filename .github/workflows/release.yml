name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build universal (Release)
        run: |
          xcodegen generate
          xcodebuild -project BandwidthLimit.xcodeproj -scheme BandwidthLimit \
            -configuration Release -derivedDataPath build \
            ARCHS="arm64 x86_64" ONLY_ACTIVE_ARCH=NO build

      - name: Package
        run: |
          APP="build/Build/Products/Release/BandwidthLimit.app"
          test -d "$APP"
          echo "archs: $(lipo -archs "$APP/Contents/MacOS/BandwidthLimit")"
          ditto -c -k --keepParent "$APP" "BandwidthLimit-${GITHUB_REF_NAME}-universal.zip"

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: BandwidthLimit-*-universal.zip
          generate_release_notes: true
          body: |
            macOS menu-bar app to cap your whole internet connection or throttle individual apps.

            **This is an unsigned, local-dev build (ad-hoc signed — not notarized).** macOS
            Gatekeeper will quarantine it, and the per-app throttle system extension only loads in
            developer mode. To run it:

            ```sh
            xattr -dr com.apple.quarantine /Applications/BandwidthLimit.app   # after copying it there
            sudo systemextensionsctl developer on
            open /Applications/BandwidthLimit.app
            ```

            Then approve **BandwidthLimit Proxy** in System Settings ▸ General ▸ Login Items &
            Extensions. The whole-internet cap and live monitor work without the extension.

            Universal binary (Apple Silicon + Intel). Requires macOS 13+.
