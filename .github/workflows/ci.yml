name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build (Debug)
        run: ./build.sh

      - name: Parser self-check
        run: |
          swiftc App/Monitor.swift Shared/AppIdentity.swift scripts/test-parse.swift -o /tmp/ptest
          /tmp/ptest
